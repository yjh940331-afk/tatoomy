<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>tatoomy 관리자</title>
  <style>
    html, body {
      min-height: 100% !important;
      height: auto !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      position: static !important;
      -webkit-overflow-scrolling: touch;
    }
    /* Sveltia CMS 루트 요소 */
    sveltia-cms, #sveltia-cms, [data-sveltia-cms] {
      display: block;
      height: auto !important;
      min-height: 100vh;
      overflow: visible !important;
    }
  </style>
</head>
<body>
  <!-- Sveltia CMS — Decap 호환, 여러 장 업로드 지원, GitHub 로그인 -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js" type="module"></script>
  <script>
    const unlockScroll = () => {
      document.documentElement.style.overflowY = 'auto';
      document.body.style.overflowY = 'auto';
      document.body.style.position = 'static';
      document.body.style.height = 'auto';
      document.body.style.touchAction = 'pan-y';
    };

    unlockScroll();
    new MutationObserver(unlockScroll).observe(document.documentElement, {
      attributes: true,
      attributeFilter: ['class', 'style'],
    });
    new MutationObserver(unlockScroll).observe(document.body, {
      attributes: true,
      attributeFilter: ['class', 'style'],
    });
  </script>
</body>
</html>
